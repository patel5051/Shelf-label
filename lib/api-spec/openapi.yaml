openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: items
    description: Item catalogue operations
  - name: print-history
    description: Print history operations
  - name: stats
    description: Dashboard statistics
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /items:
    get:
      operationId: listItems
      tags: [items]
      summary: List items
      description: Returns all items with optional search and filter
      parameters:
        - name: search
          in: query
          schema:
            type: string
          description: Search by barcode or description
        - name: department
          in: query
          schema:
            type: string
          description: Filter by department
        - name: page
          in: query
          schema:
            type: integer
          description: Page number (1-based)
        - name: limit
          in: query
          schema:
            type: integer
          description: Items per page
      responses:
        "200":
          description: List of items
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ItemListResponse"
    post:
      operationId: createItem
      tags: [items]
      summary: Create item
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ItemInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Item"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /items/bulk:
    post:
      operationId: bulkUpsertItems
      tags: [items]
      summary: Bulk upsert items from CSV data
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkUpsertInput"
      responses:
        "200":
          description: Bulk upsert result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkUpsertResult"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /items/{id}:
    get:
      operationId: getItem
      tags: [items]
      summary: Get item by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Item found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Item"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateItem
      tags: [items]
      summary: Update item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ItemUpdate"
      responses:
        "200":
          description: Updated item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Item"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteItem
      tags: [items]
      summary: Delete item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /print-history:
    get:
      operationId: listPrintHistory
      tags: [print-history]
      summary: List print history
      parameters:
        - name: search
          in: query
          schema:
            type: string
          description: Search by barcode or description
        - name: page
          in: query
          schema:
            type: integer
          description: Page number (1-based)
        - name: limit
          in: query
          schema:
            type: integer
          description: Items per page
      responses:
        "200":
          description: Print history list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PrintHistoryListResponse"
    post:
      operationId: createPrintHistoryEntry
      tags: [print-history]
      summary: Record a print event
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PrintHistoryInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PrintHistoryEntry"

  /stats:
    get:
      operationId: getDashboardStats
      tags: [stats]
      summary: Get dashboard statistics
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /departments:
    get:
      operationId: listDepartments
      tags: [items]
      summary: List all unique departments
      responses:
        "200":
          description: List of department names
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    Item:
      type: object
      required: [id, barcode, description, price, department, size, createdAt, updatedAt]
      properties:
        id:
          type: integer
        barcode:
          type: string
        description:
          type: string
        price:
          type: number
        department:
          type: string
        size:
          type: string
        createdAt:
          type: string
        updatedAt:
          type: string

    ItemInput:
      type: object
      required: [barcode, description, price, department, size]
      properties:
        barcode:
          type: string
          minLength: 1
        description:
          type: string
          minLength: 1
        price:
          type: number
        department:
          type: string
          minLength: 1
        size:
          type: string

    ItemUpdate:
      type: object
      properties:
        barcode:
          type: string
          minLength: 1
        description:
          type: string
          minLength: 1
        price:
          type: number
        department:
          type: string
          minLength: 1
        size:
          type: string

    ItemListResponse:
      type: object
      required: [items, total, page, limit]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Item"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer

    BulkUpsertInput:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ItemInput"

    BulkUpsertResult:
      type: object
      required: [inserted, updated, failed, errors]
      properties:
        inserted:
          type: integer
        updated:
          type: integer
        failed:
          type: integer
        errors:
          type: array
          items:
            type: string

    PrintHistoryEntry:
      type: object
      required: [id, itemId, barcode, description, price, department, size, printedAt]
      properties:
        id:
          type: integer
        itemId:
          type: ["integer", "null"]
        barcode:
          type: string
        description:
          type: string
        price:
          type: number
        department:
          type: string
        size:
          type: string
        printedAt:
          type: string

    PrintHistoryInput:
      type: object
      required: [barcode, description, price, department, size]
      properties:
        itemId:
          type: ["integer", "null"]
        barcode:
          type: string
        description:
          type: string
        price:
          type: number
        department:
          type: string
        size:
          type: string

    PrintHistoryListResponse:
      type: object
      required: [entries, total, page, limit]
      properties:
        entries:
          type: array
          items:
            $ref: "#/components/schemas/PrintHistoryEntry"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer

    DashboardStats:
      type: object
      required: [totalItems, totalDepartments, printedToday, printedThisWeek, recentPrints, itemsByDepartment]
      properties:
        totalItems:
          type: integer
        totalDepartments:
          type: integer
        printedToday:
          type: integer
        printedThisWeek:
          type: integer
        recentPrints:
          type: array
          items:
            $ref: "#/components/schemas/PrintHistoryEntry"
        itemsByDepartment:
          type: array
          items:
            $ref: "#/components/schemas/DepartmentCount"

    DepartmentCount:
      type: object
      required: [department, count]
      properties:
        department:
          type: string
        count:
          type: integer

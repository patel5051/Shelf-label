name: Build Android APK

on:
  push:
    branches: [ main ]
    paths:
      - 'artifacts/shelf-label-printer/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'artifacts/shelf-label-printer/**'
  workflow_dispatch:

defaults:
  run:
    working-directory: artifacts/shelf-label-printer

jobs:
  build-debug:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('artifacts/shelf-label-printer/**/*.gradle*', 'artifacts/shelf-label-printer/**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: shelf-label-printer-debug-${{ github.run_number }}
          path: artifacts/shelf-label-printer/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14
